<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Customer Account Form – De Ree UK</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">

<style>

:root{
--navy:#1A315A;
--orange:#EC7F22;
--bg:#f5f7fa;
--border:#e1e4ea;
--text-muted:#6a7280;
}

body{
font-family:Barlow,sans-serif;
background:var(--bg);
margin:0;
padding:40px;
color:#333;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:40px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,.05);
}

h1{
font-family:"Barlow Condensed",sans-serif;
letter-spacing:1px;
background:var(--navy);
color:#fff;
padding:20px;
margin:-40px -40px 30px -40px;
}

.form-section{
margin-bottom:32px;
}

.section-title{
font-family:"Barlow Condensed",sans-serif;
color:var(--navy);
font-size:20px;
margin-bottom:16px;
}

.field-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.field.full{
grid-column:1 / -1;
}

label{
font-size:13px;
font-weight:600;
display:block;
margin-bottom:5px;
}

input,textarea{
width:100%;
padding:10px;
border:1px solid var(--border);
border-radius:5px;
font-size:14px;
font-family:Barlow;
}

textarea{
min-height:70px;
}

.option-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.option-item{
display:flex;
gap:6px;
align-items:center;
font-size:14px;
}

.submit-area{
text-align:center;
margin-top:40px;
}

button{
background:var(--navy);
color:#fff;
border:none;
padding:14px 28px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#13274a;
}

.req{
color:red;
}

</style>
</head>

<body>

<div class="container">

<h1>NEW CUSTOMER ACCOUNT FORM</h1>

<form>

<!-- CLIENT INFORMATION -->

<div class="form-section">

<div class="section-title">Client Information</div>

<div class="field-grid">

<div class="field full">
<label>Company Name <span class="req">*</span></label>
<input type="text" name="company_name" required>
</div>

<div class="field">
<label>VAT Number</label>
<input type="text" name="vat_number">
</div>

<div class="field">
<label>Website</label>
<input type="text" name="website">
</div>

<div class="field">
<label>Year Company Established</label>
<input type="text" name="year_established" required>
</div>

<div class="field">
<label>Telephone</label>
<input type="tel" name="telephone" required>
</div>

<div class="field">
<label>Fax</label>
<input type="tel" name="fax">
</div>

<div class="field full">
<label>Email <span class="req">*</span></label>
<input type="email" name="email" required>
</div>

<div class="field full">
<label>Invoice Address</label>
<textarea name="invoice_address" required></textarea>
</div>

<div class="field">
<label>Post Code</label>
<input type="text" name="postcode" required>
</div>

<div class="field">
<label>Purchasing Contact</label>
<input type="text" name="purchasing_contact" required>
</div>

<div class="field">
<label>Accounts Contact</label>
<input type="text" name="accounts_contact" required>
</div>

<div class="field full">
<label>Delivery Address (if different)</label>
<textarea name="delivery_address"></textarea>
</div>

<div class="field full">
<label>Delivery Restrictions</label>
<input type="text" name="delivery_restrictions">
</div>

</div>
</div>

<!-- CREDIT -->

<div class="form-section">

<div class="section-title">Credit Required</div>

<div class="field-grid">

<div class="field full">
<label>Amount of Credit Required (£)</label>
<input type="number" name="credit_required" required>
</div>

</div>

</div>

<!-- LEGAL STYLE -->

<div class="form-section">

<div class="section-title">Legal Trading Style</div>

<div class="option-grid">

<div class="option-item">
<input type="radio" name="legal_style" value="limited" required>
<label>Limited Company</label>
</div>

<div class="option-item">
<input type="radio" name="legal_style" value="sole">
<label>Sole Trader</label>
</div>

<div class="option-item">
<input type="radio" name="legal_style" value="partnership">
<label>Partnership</label>
</div>

</div>

</div>

<!-- BANK -->

<div class="form-section">

<div class="section-title">Bank Information</div>

<div class="field-grid">

<div class="field full">
<label>Bank Name</label>
<input type="text" name="bank_name" required>
</div>

<div class="field full">
<label>Bank Address</label>
<textarea name="bank_address" required></textarea>
</div>

<div class="field">
<label>Sort Code</label>
<input type="text" name="sort_code" required>
</div>

<div class="field">
<label>Account Number</label>
<input type="text" name="account_number" required>
</div>

</div>

</div>

<!-- DECLARATION -->

<div class="form-section">

<div class="section-title">Declaration</div>

<div class="field-grid">

<div class="field full">
<label>Signed</label>
<input type="text" name="signed" required>
</div>

<div class="field">
<label>Name</label>
<input type="text" name="name" required>
</div>

<div class="field">
<label>Position</label>
<input type="text" name="position" required>
</div>

<div class="field">
<label>Date</label>
<input type="date" name="date" required>
</div>

</div>

</div>

<div class="submit-area">
<button type="submit">Submit Application</button>
</div>

</form>

</div>

</body>
</html>
