<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wagon Allocation Planner</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Wagon Allocation Planner</h1>
        <p>Upload a store rack spreadsheet, generate wagon allocations, and export planning outputs.</p>
      </header>

      <section class="card">
        <h2>1) Upload & Parse</h2>
        <div class="field-row">
          <label for="file-input">Excel file (.xlsx/.xls)</label>
          <input id="file-input" type="file" accept=".xlsx,.xls" />
        </div>
        <p id="file-status" class="status muted">No file loaded.</p>
        <div id="preview-wrap" class="hidden">
          <h3>Parsed Store Preview</h3>
          <div class="table-scroll">
            <table id="preview-table"></table>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>2) Allocation Settings</h2>
        <div class="settings-grid">
          <div class="field-row">
            <label for="wagon-count">Number of wagons</label>
            <input id="wagon-count" type="number" min="1" max="100" value="10" />
          </div>
          <div class="field-row">
            <label for="target-lifts">Target lifts per wagon</label>
            <input id="target-lifts" type="number" min="1" value="93" />
          </div>
          <div class="field-row">
            <label for="max-rack-types">Max rack types per wagon</label>
            <input id="max-rack-types" type="number" min="1" value="5" />
          </div>
          <div class="field-row checkbox-row">
            <input id="allow-final-exceed" type="checkbox" checked />
            <label for="allow-final-exceed">Allow final wagon to exceed rack type limit</label>
          </div>
        </div>
        <div class="button-row">
          <button id="allocate-btn" type="button">Run Allocation</button>
          <button id="export-btn" type="button" disabled>Export XLSX</button>
        </div>
      </section>

      <section class="card">
        <h2>3) Allocation Output</h2>
        <div id="messages"></div>
        <div id="results-wrap" class="hidden"></div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
